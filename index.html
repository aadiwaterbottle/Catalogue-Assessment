<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vinyl Vault | Music Catalogue</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <h1></h1>
    
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-[100] border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <!-- Brand Logo -->
            <div class="flex items-center gap-2">
                <span class="logo-font text-3xl text-black tracking-widest cursor-pointer select-none" onclick="showSection('home')">TVV</span>
            </div>
            
            <!-- Core Navigation Menu -->
            <div class="hidden md:flex items-center gap-8 text-xs font-bold uppercase tracking-widest">
                <span class="nav-link active" data-section="home" onclick="showSection('home')">Home</span>
                <span class="nav-link" data-section="popular" onclick="showSection('popular')">Popular</span>
                <span class="nav-link" data-section="new" onclick="showSection('new')">New Releases</span>
                <span href="collection.html" class="nav-link" data-section="collection" onclick="showSection('collection')">Collection</span>
            </div>

            <!-- Header Action Button -->
            <div class="flex items-center gap-4">
                <a href="register.html" class="bg-black text-white px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-red-600 transition-colors duration-300 inline-block">Join Vault</a>
            </div>
        </div>
    </nav>
<section class="max-w-7xl mx-auto px-6 mt-32 mb-12">

    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">

        <div>
            <h1 class="text-6xl font-black uppercase tracking-tight">
                The Vinyl Vault
            </h1>

            <p class="text-zinc-500 mt-3 uppercase tracking-[0.3em] text-sm">
                Discover Albums. Build Collections. Review Music.
            </p>
        </div>

        <div class="flex gap-3 w-full md:w-auto">

            <input
            id="searchInput"
            type="text"
            placeholder="Search albums..."
            class="border border-zinc-300 rounded-full px-6 py-3 w-full md:w-[320px]">

            <button
            onclick="searchSpotify()"
            class="bg-black text-white px-6 py-3 rounded-full hover:bg-red-600 transition">
                Search
            </button>

        </div>
    

</section>

    <main class="catalogue-grid">
        <div class="record-card">
            <div class="vinyl-disc"></div>
            <div class="sleeve">
                <img src="letitbleed.jpg" alt="Album Cover">
            </div>
            <div class="info">
                <p class="artist">The Rolling Stones</p>
                <p class="album">Let It Bleed (1969)</p>
            </div>
        </div>

        <div class="record-card">
            <div class="vinyl-disc"></div>
            <div class="sleeve">
                <img src="kind of blue.jpg" alt="Album Cover">
            </div>
            <div class="info">
                <p class="artist">Miles Davis</p>
                <p class="album">Kind of Blue (1959)</p>
            </div>
        </div>

    </main>
    <script src="app.js"></script>
</body>
</html>

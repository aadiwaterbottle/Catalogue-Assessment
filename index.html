<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vinyl Vault | Music Catalogue</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1></h1>
    

    <main class="catalogue-grid">
        <div class="record-card">
            <div class="vinyl-disc"></div>
            <div class="sleeve">
                <img src="letitbleed.jpg" alt="Album Cover">
            </div>
            <div class="info">
                <p class="artist">The Rolling Stones</p>
                <p class="album">Let It Bleed (1969)</p>
            </div>
        </div>

        <div class="record-card">
            <div class="vinyl-disc"></div>
            <div class="sleeve">
                <img src="kind of blue.jpg" alt="Album Cover">
            </div>
            <div class="info">
                <p class="artist">Miles Davis</p>
                <p class="album">Kind of Blue (1959)</p>
            </div>
        </div>

    </main>

</body>
</html>

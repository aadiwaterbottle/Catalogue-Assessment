<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popular Albums</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-[100] border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <a href="index.html" class="logo-font text-3xl text-black tracking-widest">TVV</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="register.html" class="bg-black text-white px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-red-600">Join Vault</a>
        </div>
    </div>
</nav>

<section class="max-w-7xl mx-auto px-6 mt-32 mb-6">
    <h1 class="text-5xl font-black uppercase mb-6">Popular</h1>
</section>

<main class="catalogue-grid"></main>

<script src="app.js"></script>
<script>
(async function(){
  try{
    const res = await fetch('/api/popular');
    const records = await res.json();
    // adapt DB records to same shape as renderRecords expects
    const formatted = records.map(r => ({ artist: r.artist, album: r.album + (r.release_year ? ` (${r.release_year})` : ''), image_url: r.image_url, genre: r.genre }));
    renderRecords(formatted);
  } catch(e){ console.error(e); }
})();
</script>
</body>
</html>

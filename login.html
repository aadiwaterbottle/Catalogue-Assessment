<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 min-h-screen flex items-center justify-center">

<form action="/login" method="POST"
class="bg-white p-10 rounded-2xl shadow-xl w-[400px] space-y-4">

    <h1 class="text-3xl font-bold">Login</h1>

    <input
    type="email"
    name="email"
    placeholder="Email"
    class="w-full border p-3 rounded-xl"
    required>

    <input
    type="password"
    name="password"
    placeholder="Password"
    class="w-full border p-3 rounded-xl"
    required>

    <button
    class="bg-black text-white w-full py-3 rounded-xl hover:bg-red-600 transition">
        Login
    </button>

</form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — The Vinyl Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f7f7f9; }
        .logo-font { font-family: 'Monoton', cursive; }
        .card { background: white; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.06); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-6">
            <div class="logo-font text-4xl">The Vinyl Vault</div>
            <p class="text-sm text-gray-500 mt-2">Sign in to access your collection</p>
        </div>

        <div class="card p-8">
            <form id="loginForm" action="/login" method="POST" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-700">Email</label>
                    <input name="email" type="email" required class="mt-2 w-full px-4 py-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-red-400" placeholder="you@vinylvault.test">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-700">Password</label>
                    <input name="password" type="password" required class="mt-2 w-full px-4 py-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-red-400" placeholder="••••••••">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-black text-white py-3 rounded-full font-bold uppercase tracking-wider hover:bg-red-600 transition-colors">Sign In</button>
                </div>

                <div id="msg" class="text-sm text-center text-red-500 mt-2 hidden"></div>
            </form>

            <p class="text-xs text-gray-500 text-center mt-4">Don't have an account? Contact the site admin to create one.</p>
        </div>
    </div>

    <script>
        // Progressive enhancement: try to POST to /login via fetch
        document.getElementById('loginForm').addEventListener('submit', async function(e){
            e.preventDefault();
            const form = e.target;
            const data = { email: form.email.value.trim(), password: form.password.value };

            const msg = document.getElementById('msg');
            msg.classList.add('hidden');

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    // on success, redirect to homepage
                    window.location.href = '/index.html';
                } else {
                    const body = await res.json().catch(()=>({message:'Unable to sign in'}));
                    msg.textContent = body.message || 'Invalid credentials';
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                msg.textContent = 'Network error — try again later';
                msg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>

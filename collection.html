<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 min-h-screen p-10">

<h1 class="text-5xl font-black uppercase mb-10">
    My Collection
</h1>

<div id="collectionGrid"
class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
</div>

<script>

async function loadCollection() {

    const response = await fetch('/api/my-collection');

    const albums = await response.json();

    const grid = document.getElementById('collectionGrid');

    albums.forEach(album => {

        grid.innerHTML += `

        <div class="bg-white rounded-3xl overflow-hidden shadow-xl">

            <img src="${album.image_url}"
            class="w-full aspect-square object-cover">

            <div class="p-5">
                <h2 class="font-black uppercase">${album.artist}</h2>
                <p class="text-zinc-500 italic">${album.album}</p>
            </div>

        </div>
        `;
    });
}

loadCollection();

</script>

</body>
</html>
